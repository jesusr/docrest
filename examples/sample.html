<h1>docrest sample</h1>
<p>This is a tiny Markdown document used to demonstrate <code>docrest</code>.</p>
<h2>Features</h2>
<ul>
<li>Convert between <strong>md</strong>, <strong>txt</strong>, <strong>docx</strong>, <strong>html</strong>, <strong>pdf</strong>.</li>
<li>Render Mermaid and PlantUML diagrams.</li>
</ul>
<h2>Try it</h2>
<pre><code class="language-bash">docrest convert examples/sample.md /tmp/sample.txt
docrest convert examples/sample.md /tmp/sample.html
</code></pre>
